name: Lint & Validate

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt || true

      - name: Run flake8
        run: |
          pip install flake8
          flake8 .

      - name: Verify tree
        run: |
          bash scripts/verify-tree.sh
